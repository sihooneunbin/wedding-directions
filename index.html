<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location & Directions</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: "Pretendard","Noto Sans KR",sans-serif;
            background:#ffffff;
            color:#222;
            line-height:1.8;
        }

        .container{
            max-width:500px;
            margin:auto;
            padding:70px 28px;
        }

        .small{
            color:#888;
            font-size:14px;
            letter-spacing:2px;
            text-transform:uppercase;
        }

        h1{
            font-size:38px;
            font-weight:300;
            margin-top:10px;
            line-height:1.25;
        }

        .date{
            margin-top:70px;
            font-size:16px;
            color:#666;
        }

        .hall{
            margin-top:25px;
            font-size:25px;
            font-weight:500;
        }

        .place{
            color:#666;
            margin-top:8px;
        }

        .line{
            width:60px;
            height:1px;
            background:#ddd;
            margin:60px auto;
        }

        .button{
            display:block;
            text-decoration:none;
            color:#222;
            border:1px solid #ddd;
            padding:15px;
            text-align:center;
            margin-top:15px;
            transition:.2s;
        }

        .button:hover{
            background:#222;
            color:white;
        }
    </style>

</head>

<body>

<div class="container">

<div class="small">
Wedding Invitation
</div>

<h1>
Location<br>
& Directions
</h1>

<div class="date">
2027.12.05 Sunday<br>
11:30 AM
</div>

<div class="hall">
센텀사이언스파크
</div>

<div class="place">
더파티 센텀점
</div>

<div class="line"></div>

<a class="button" href="#">
네이버 길찾기
</a>

<a class="button" href="#">
카카오맵 길찾기
</a>

</div>

</body>
</html>
