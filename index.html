<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Directions</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <header class="hero">
        <p class="eyebrow">Wedding Invitation</p>

        <h1>
            Location<br>
            <span>&amp; Directions</span>
        </h1>

        <p class="date">
            2027.12.05 Sunday<br>
            11:30 AM
        </p>

        <h2>센텀사이언스파크</h2>
        <p class="hall">더파티 센텀점</p>
    </header>

    <section class="buttons">

        <a href="#" class="btn">
            네이버 길찾기
        </a>

        <a href="#" class="btn">
            카카오맵 길찾기
        </a>

        <a href="#" class="btn">
            주소 복사
        </a>

    </section>

    <section class="map">

        <h3>Map</h3>

        <img src="map.png" alt="약도">

    </section>

    <section class="transport">

        <h3>Driving</h3>
        <p>자가용 안내가 들어갈 자리</p>

        <h3>Subway</h3>
        <p>지하철 안내가 들어갈 자리</p>

        <h3>Bus</h3>
        <p>셔틀버스 안내가 들어갈 자리</p>

        <h3>Parking</h3>
        <p>주차 안내가 들어갈 자리</p>

    </section>

</div>

<script src="script.js"></script>

</body>
</html>
